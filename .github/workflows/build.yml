name: Flutter Release Pipeline

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    name: Android Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Get Dependencies
        run: flutter pub get

      - name: Restore Keystore
        run: |
          # 1. ضمان وجود مجلد android لتجنب خطأ "No such file or directory"
          mkdir -p android
          
          # 2. فك التشفير وحفظ الملف
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks
          
          # 3. خطوة اختيارية للتحقق من أن الملف ليس فارغاً (لمنع الأخطاء الصامتة)
          ls -l android/upload-keystore.jks

      - name: Create key.properties        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          # تم التصحيح: المسار نسبي لمجلد android، لذا لا نحتاج لـ ../
          storeFile=upload-keystore.jks
          EOF

      - name: Analyze
        run: flutter analyze
        # ملاحظة: قمت بإزالة continue-on-error هنا لضمان جودة الكود قبل الإصدار

      - name: Run Tests
        run: flutter test
        continue-on-error: true # يمكن إبقاؤها هنا إذا كانت بعض الاختبارات غير مستقرة

      - name: Build APK
        run: flutter build apk --release

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab

  windows:
    name: Windows Release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop
      - name: Get Dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Zip Windows Build
        shell: powershell
        run: |
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath windows-release.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: windows-release.zip

  release:
    name: GitHub Release
    needs:
      - android
      - windows
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        # الإصدار v4 يقوم تلقائياً بإنشاء مجلدات بأسماء الـ artifacts (release-apk, release-aab, windows-release)

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: |
            release-apk/app-release.apk
            release-aab/app-release.aab
            windows-release/windows-release.zip